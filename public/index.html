<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Waevo Proxy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cyan: #00f5ff;
      --pink: #ff2d6b;
      --purple: #7b2dff;
      --bg: #020810;
      --surface: #060e1a;
      --border: rgba(0,245,255,0.15);
      --glow: 0 0 20px rgba(0,245,255,0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #c0d8e8;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.8s ease both;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(0,245,255,0.5));
      line-height: 1;
    }

    .logo span {
      color: var(--pink);
      -webkit-text-fill-color: var(--pink);
    }

    .tagline {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: var(--cyan);
      opacity: 0.6;
      text-transform: uppercase;
    }

    /* Proxy card */
    .proxy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2.5rem;
      width: 100%;
      max-width: 680px;
      box-shadow:
        0 0 0 1px rgba(0,245,255,0.05),
        0 0 60px rgba(0,245,255,0.05),
        inset 0 1px 0 rgba(0,245,255,0.1);
      animation: fadeUp 0.8s 0.2s ease both;
      position: relative;
      overflow: hidden;
    }

    .proxy-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    .corner {
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--cyan);
      border-style: solid;
      opacity: 0.6;
    }
    .corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--cyan);
      opacity: 0.5;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    /* Search bar */
    .search-wrap {
      display: flex;
      gap: 0;
      position: relative;
    }

    .search-input {
      flex: 1;
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.2);
      border-right: none;
      border-radius: 2px 0 0 2px;
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      padding: 0.85rem 1.2rem;
      outline: none;
      transition: all 0.2s;
      caret-color: var(--cyan);
    }

    .search-input::placeholder { color: rgba(0,245,255,0.25); }
    .search-input:focus {
      border-color: rgba(0,245,255,0.6);
      background: rgba(0,245,255,0.07);
      box-shadow: var(--glow);
    }

    .search-btn {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border: none;
      border-radius: 0 2px 2px 0;
      color: #000;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 0.85rem 1.5rem;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .search-btn:hover {
      filter: brightness(1.2);
      box-shadow: 0 0 20px rgba(0,245,255,0.5);
    }

    .search-btn:active { transform: scale(0.98); }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1.2rem;
      font-size: 0.7rem;
      color: rgba(0,245,255,0.4);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 8px #00ff88;
      animation: pulse 2s infinite;
    }

    /* Quick links */
    .quicklinks {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .quicklinks-label {
      width: 100%;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      color: rgba(0,245,255,0.3);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .qlink {
      background: rgba(0,245,255,0.05);
      border: 1px solid rgba(0,245,255,0.1);
      border-radius: 2px;
      color: rgba(0,245,255,0.5);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .qlink:hover {
      background: rgba(0,245,255,0.1);
      border-color: rgba(0,245,255,0.35);
      color: var(--cyan);
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: rgba(0,245,255,0.2);
      text-align: center;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .footer span { color: var(--pink); }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Loading overlay */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 99;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }
    #loading.active { display: flex; }
    .loader-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      color: var(--cyan);
      letter-spacing: 0.3em;
      animation: pulse 1s infinite;
    }
    .loader-bar {
      width: 200px; height: 2px;
      background: rgba(0,245,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .loader-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: var(--cyan);
      animation: slide 1s infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loader-text">CONECTANDO...</div>
  <div class="loader-bar"></div>
</div>

<div class="container">
  <div class="header">
    <div class="logo">WAEVO<span>.</span>PROXY</div>
    <div class="tagline">Acceso sin límites · Navegación privada · Cybersecure</div>
  </div>

  <div class="proxy-card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="card-label">// Ingresa una URL o búsqueda</div>

    <div class="search-wrap">
      <input
        class="search-input"
        id="urlInput"
        type="text"
        placeholder="https://google.com  o  buscar algo..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" onclick="navigate()">ENTRAR</button>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span>PROXY ACTIVO · ENCRIPTADO · XOR/UV</span>
    </div>

    <div class="quicklinks">
      <div class="quicklinks-label">// acceso rápido</div>
      <a class="qlink" onclick="goTo('https://google.com')">Google</a>
      <a class="qlink" onclick="goTo('https://youtube.com')">YouTube</a>
      <a class="qlink" onclick="goTo('https://reddit.com')">Reddit</a>
      <a class="qlink" onclick="goTo('https://twitter.com')">Twitter/X</a>
      <a class="qlink" onclick="goTo('https://discord.com')">Discord</a>
      <a class="qlink" onclick="goTo('https://github.com')">GitHub</a>
      <a class="qlink" onclick="goTo('https://instagram.com')">Instagram</a>
      <a class="qlink" onclick="goTo('https://spotify.com')">Spotify</a>
    </div>
  </div>

  <div class="footer">
    WAEVO-PROXY v1.0 · POWERED BY ULTRAVIOLET · BUILT BY <span>ALEX</span>
  </div>
</div>

<!-- Scripts de Ultraviolet -->
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>

<script>
  // Registrar el Service Worker
  async function registerSW() {
    if (!navigator.serviceWorker) {
      console.warn("Service Worker no soportado");
      return;
    }
    try {
      await navigator.serviceWorker.register("/uv/uv.sw.js", {
        scope: __uv$config.prefix,
      });
      console.log("✅ UV Service Worker registrado");
    } catch (err) {
      console.error("❌ Error registrando SW:", err);
    }
  }

  // Configurar BareMux con Epoxy
  async function setupTransport() {
    const conn = new BareMux.BareClient();
    const wispUrl = (location.protocol === "https:" ? "wss" : "ws") +
      "://" + location.host + "/wisp/";
    await BareMux.SetTransport("EpxWorker", {
      wisp: wispUrl
    });
  }

  function showLoading() {
    document.getElementById("loading").classList.add("active");
  }

  function navigate() {
    const input = document.getElementById("urlInput").value.trim();
    if (!input) return;

    let url = input;

    // Si no tiene protocolo y parece una URL, agrega https://
    if (!/^https?:\/\//i.test(url)) {
      if (/^[\w-]+\.\w+/.test(url)) {
        url = "https://" + url;
      } else {
        // Es una búsqueda
        url = "https://www.google.com/search?q=" + encodeURIComponent(url);
      }
    }

    showLoading();
    setTimeout(() => {
      location.assign(__uv$config.prefix + __uv$config.encodeUrl(url));
    }, 600);
  }

  function goTo(url) {
    document.getElementById("urlInput").value = url;
    navigate();
  }

  // Enter para navegar
  document.getElementById("urlInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") navigate();
  });

  // Init
  registerSW();
  setupTransport();
</script>
</body>
</html>
